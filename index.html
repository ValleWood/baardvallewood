8<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ValleWood – Lag din egen dekkstol</title>

  <style>
    :root {
      --bg: #faf9f7;
      --text: #1a1a1a;
      --sub: #5a5a5a;
      --accent: #3e2723;
      --accent-light: #5d4037;
      --radius: 14px;
      --shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    header {
      text-align: center;
      padding: 3.5rem 1.2rem 2rem;
      background: linear-gradient(135deg, #e8e3df, #f7f4f2);
      border-bottom: 1px solid #ddd;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      margin-bottom: 0.4rem;
      letter-spacing: -1px;
      font-weight: 700;
    }

    .sub {
      font-size: 1.1rem;
      color: var(--sub);
      margin-bottom: 1.8rem;
    }

    .cta {
      display: inline-block;
      padding: 1rem 2.2rem;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 1.15rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      transition: 0.25s ease;
    }

    .cta:hover {
      background: var(--accent-light);
      transform: translateY(-3px);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.2rem;
      padding: 2.5rem 1.2rem 3rem;
      max-width: 1100px;
      margin: auto;
    }

    .gallery img {
      width: 90%;
      height: 260px;
      object-fit: cover;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: 0.25s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9rem;
      color: var(--sub);
    }
  </style>
</head>

<body>

  <header>
    <h1>ValleWood</h1>
    <p class="sub">Bygg din egen dekkstol</p>

    <!-- OPPDATERT DIREKTELINK TIL PAYHIP -->
    <a class="cta" href="https://payhip.com/vallewood" target="_blank">
      Gå til nettbutikken - denne linken tar deg til min betalingsside
    </a>
  </header>

  <section class="gallery">
    <img src="bilde1.jpg" alt="Nette stoler">
    <img src="bilde2.jpg" alt="Kjøp malene så du kan masseprodusere">
    <img src="bilde3.jpg" alt="Perfekte for en middagshvil">
    <img src="bilde4.jpg" alt="Dagdrømmer er å foretrekke">
  </section>

  <footer>
    © <span id="year"></span> ValleWood – Grimstad, Norge
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>

<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Document</title>\n    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap' rel='stylesheet'>\n    <style>\n        body { font-family: 'Inter', sans-serif; }\n        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }\n        .grid img { width: 100%; height: auto; aspect-ratio: 16 / 9; }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>Welcome to Baard Vallewood</h1>\n    </header>\n    <main>\n        <section class='grid'>\n            <img src='https://source.unsplash.com/random/300x200?landscape' alt='Landscape'>\n            <img src='https://source.unsplash.com/random/300x200?city' alt='Cityscape'>\n            <img src='https://source.unsplash.com/random/300x200?nature' alt='Nature'>\n            <img src='https://source.unsplash.com/random/300x200?architecture' alt='Architecture'>\n        </section>\n    </main>\n    <footer>\n        <p>&copy; 2026 Baard Vallewood</p>\n    </footer>\n</body>\n</html>

<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>ValleWood – Digitale byggetegninger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f4f4f3;
      --white: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 100px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 60px;
    }

    .header img {
      height: 120px; /* STOR LOGO */
      width: auto;
    }

    .header span {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    /* HERO */
    .hero {
      max-width: 850px;
      margin-bottom: 70px;
    }

    .hero h1 {
      font-size: 44px;
      margin-bottom: 18px;
    }

    .hero p {
      font-size: 18px;
      color: var(--muted);
    }

    /* BILDER */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
      margin-bottom: 80px;
    }

    .image-grid img {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--white);
    }

    /* CTA */
    .cta {
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 26px;
      padding: 50px;
      max-width: 760px;
      margin: 0 auto 90px;
      text-align: center;
    }

    .cta h2 {
      font-size: 34px;
      margin-bottom: 14px;
    }

    .cta p {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    /* RUND KNAPP MED LOGO */
    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      padding: 22px 44px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 800;

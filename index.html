<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>ValleWood – Digitale tegninger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f5f5f4;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 36px;
      margin-bottom: 12px;
    }

    header p {
      color: var(--muted);
      max-width: 700px;
      margin: 0 auto;
    }

    /* BILDEGALLERI */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 56px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
    }

    /* KJØPSEKSJON */
    .shop-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
    }

    .shop-card h2 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .shop-card p {
      color: var(--muted);
      margin-bottom: 28px;
    }

    .shop-button {
      display: inline-block;
      padding: 16px 32px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      border-radius: 10px;
      font-size: 18px;
    }

    .shop-button:hover {
      background: var(--accent-dark);
    }

    footer {
      margin-top: 80px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 28px;
      }

      .shop-card {
        padding: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- TOPP -->
    <header>
      <h1>Digitale tegninger i tre</h1>
      <p>
        Praktiske og gjennomarbeidede PDF‑tegninger for deg som vil bygge selv.
        Tegningene er laget for faktisk bruk i verkstedet – med tydelige mål og detaljer.
        Send dem til et trykkeri og få maler i full størrelse som du kan streke opp delene etter.
      </p>
    </header>

    <!-- BILDER -->
    <section class="gallery">
      <img src="images/bilde1.jpg" alt="Treprosjekt – bilde 1">
      <img src="images/bilde2.jpg" alt="Treprosjekt – bilde 2">
      <img src="images/bilde3.jpg" alt="Treprosjekt – bilde 3">
      <img src="images/bilde4.jpg" alt="Treprosjekt – bilde 3">

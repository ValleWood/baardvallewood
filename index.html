<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adirondack dekkstol - bygg din egen</title>

  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      text-align: center;
      padding: 4rem 1rem 2rem;
      background: linear-gradient(135deg, #d7ccc8, #efebe9);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      letter-spacing: -1px;
    }

    .sub {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 2rem;
    }

    .cta {
      display: inline-block;
      padding: 1rem 2rem;
      background: #3e2723;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1.1rem;
      transition: 0.2s;
    }

    .cta:hover {
      background: #5d4037;
      transform: translateY(-2px);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 3rem 1.5rem;
      max-width: 1200px;
      margin: auto;
    }

    .gallery img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      transition: 0.25s;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>

<body>

  <header>
    <h1>ValleWood</h1>
    <p class="sub">Håndlagde møbler i tre – bygget for å vare</p>

    <a class="cta" href="https://din-nettbutikk.no" target="_blank">
      Besøk nettbutikken
    </a>
  </header>

  <section class="gallery">
    <img src="bilde1.jpg" alt="Møbel 1">
    <img src="bilde2.jpg" alt="Møbel 2">
    <img src="bilde3.jpg" alt="Møbel 3">
  </section>

  <footer>
    © <span id="year"></span> Baard Valle Wood – Grimstad, Norge
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>

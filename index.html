<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baard Valle Wood – Håndlagde møbler</title>

  <style>
    :root {
      --bg: #11100f;
      --bg-soft: #1c1917;
      --accent: #d7b377;
      --accent-soft: rgba(215, 179, 119, 0.12);
      --text: #f5f5f5;
      --muted: #a8a29e;
      --border: #3f3a36;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: radial-gradient(circle at top, #292524 0, #11100f 45%, #020202 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 3rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-wrap img {
      height: 64px;
      width: auto;
      border-radius: 12px;
      background: #000;
      object-fit: contain;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .brand-text h1 {
      font-size: 1.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand-text span {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .badge {
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(0, 0, 0, 0.35);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.1fr);
      gap: 2.5rem;
      align-items: center;
      margin-bottom: 3rem;
    }

    .hero-text h2 {
      font-size: clamp(2.4rem, 4vw, 3rem);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .hero-text h2 span {
      background: linear-gradient(120deg, #f5f5f5, #facc6b, #d7b377);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-text p {
      font-size: 1rem;
      color: var(--muted);
      max-width: 32rem;
      margin-bottom: 1.75rem;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .pill {
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text);
      background: var(--bg-soft);
    }

    .cta-main {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.9rem 1.8rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      color: #1c1917;
      font-weight: 600;
      font-size: 0.98rem;
      background: linear-gradient(135deg, #facc6b, #d7b377);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(0, 0, 0, 0.9);
      transition: transform 0.16s ease-out, box-shadow 0.16s ease-out, filter 0.16s ease-out;
    }

    .cta-main:hover {
      transform: translateY(-1px) scale(1.01);
      filter: brightness(1.05);
      box-shadow:
        0 22px 55px rgba(0, 0, 0, 0.85),
        0 0 0 1px rgba(0, 0, 0, 0.9);
    }

    .cta-main-icon {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #1c1917;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 0.8rem;
    }

    .hero-note {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .hero-preview {
      background: radial-gradient(circle at top, rgba(215, 179, 119, 0.18), transparent 55%);
      border-radius: 20px;
      padding: 1.2rem;
      border: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
